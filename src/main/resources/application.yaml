spring:
  application:
    name: paper-rag-server
  servlet:
    multipart:
      max-request-size: 50MB
      max-file-size: 50MB

  config:
    import: optional:classpath:application-local.yaml

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  rabbitmq:
    host: ${RABBITMQ_HOST:192.168.200.129}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com
      chat:
        enabled: true
        options:
          model: qwen3.6-flash
          temperature: 0.2
          max-tokens: 2048
          enable-thinking: false
          multi-model: true
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536

    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: ${PGVECTOR_DIMENSIONS:1536}
        index-type: ${PGVECTOR_INDEX_TYPE:hnsw}
        distance-type: ${PGVECTOR_DISTANCE_TYPE:cosine_distance}
        max-document-batch-size: ${PGVECTOR_BATCH_SIZE:10000}
        schema-validation: false
        remove-existing-vector-store-table: false
        table-name: ${PGVECTOR_TABLE_NAME:vector_store}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.lqr.paperragserver: ${LOG_LEVEL_APP:INFO}
    com.lqr.paperragserver.document: ${LOG_LEVEL_DOCUMENT:INFO}
    com.lqr.paperragserver.rag: ${LOG_LEVEL_RAG:INFO}
    com.lqr.paperragserver.agent: ${LOG_LEVEL_AGENT:INFO}
    com.lqr.paperragserver.literature: ${LOG_LEVEL_LITERATURE:INFO}
    com.lqr.paperragserver.vector: ${LOG_LEVEL_VECTOR:INFO}
    com.lqr.paperragserver.ai: ${LOG_LEVEL_AI:INFO}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  type-handlers-package: com.lqr.paperragserver.common.typehandler

app:
  literature:
    search:
      openalex:
        enabled: ${LITERATURE_OPENALEX_ENABLED:true}
        endpoint: ${LITERATURE_OPENALEX_ENDPOINT:https://api.openalex.org/works}
        timeout: ${LITERATURE_OPENALEX_TIMEOUT:10s}
        mailto: ${LITERATURE_OPENALEX_MAILTO:}
      cache:
        enabled: ${LITERATURE_SEARCH_CACHE_ENABLED:true}
        ttl: ${LITERATURE_SEARCH_CACHE_TTL:20m}
  storage:
    oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      bucket: ${ALIYUN_OSS_BUCKET:}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
      public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:}
      avatar-prefix: ${ALIYUN_OSS_AVATAR_PREFIX:avatars}
      avatar-max-size: ${ALIYUN_OSS_AVATAR_MAX_SIZE:5MB}
      allowed-content-types:
        - image/jpeg
        - image/png
        - image/webp
  rag:
    chunk-size: ${RAG_CHUNK_SIZE:800}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:120}
    default-top-k: ${RAG_DEFAULT_TOP_K:3}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0}
    rerank:
      enabled: ${RAG_RERANK_ENABLED:true}
      model: ${RAG_RERANK_MODEL:qwen3-rerank}
      candidate-multiplier: ${RAG_RERANK_CANDIDATE_MULTIPLIER:3}
      timeout: ${RAG_RERANK_TIMEOUT:10s}
      base-url: ${RAG_RERANK_BASE_URL:https://dashscope.aliyuncs.com}
  document-ingestion:
    storage-dir: ${DOCUMENT_INGESTION_STORAGE_DIR:storage/document-ingestion}
    keep-upload-file: ${DOCUMENT_INGESTION_KEEP_UPLOAD_FILE:false}
    max-retry-count: ${DOCUMENT_INGESTION_MAX_RETRY_COUNT:3}
    cleanup:
      enabled: ${DOCUMENT_INGESTION_CLEANUP_ENABLED:true}
      retention: ${DOCUMENT_INGESTION_CLEANUP_RETENTION:24h}
      cron: "${DOCUMENT_INGESTION_CLEANUP_CRON:0 0 * * * *}"
    listener:
      concurrency: ${DOCUMENT_INGESTION_LISTENER_CONCURRENCY:3}
      max-concurrency: ${DOCUMENT_INGESTION_LISTENER_MAX_CONCURRENCY:6}
  security:
    jwt:
      issuer: ${JWT_ISSUER:paper-rag-server}
      secret: ${JWT_SECRET:paper-rag-server-local-development-secret-change-before-production}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:2h}
    register-email-code:
      code-ttl: ${REGISTER_EMAIL_CODE_TTL:5m}
      email-cooldown: ${REGISTER_EMAIL_CODE_EMAIL_COOLDOWN:60s}
      email-daily-limit: ${REGISTER_EMAIL_CODE_EMAIL_DAILY_LIMIT:10}
      ip-minute-limit: ${REGISTER_EMAIL_CODE_IP_MINUTE_LIMIT:20}
      ip-daily-limit: ${REGISTER_EMAIL_CODE_IP_DAILY_LIMIT:200}
    login-attempt:
      enabled: ${LOGIN_ATTEMPT_ENABLED:true}
      max-failures: ${LOGIN_ATTEMPT_MAX_FAILURES:5}
      window: ${LOGIN_ATTEMPT_WINDOW:10m}
      lock-duration: ${LOGIN_ATTEMPT_LOCK_DURATION:10m}
    bootstrap-admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
      display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}

management:
  endpoints:
    web:
      exposure:
        include: health,info
