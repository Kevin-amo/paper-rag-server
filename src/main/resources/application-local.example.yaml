spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}

app:
  storage:
    oss:
      endpoint: https://oss-cn-hangzhou.aliyuncs.com
      bucket: your-bucket-name
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
      public-base-url: https://your-bucket-name.oss-cn-hangzhou.aliyuncs.com
      avatar-prefix: avatars
      avatar-max-size: 5MB
      allowed-content-types:
        - image/jpeg
        - image/png
        - image/webp
  rag:
    chunk-size: 800
    chunk-overlap: 120
    default-top-k: 5
    similarity-threshold: 0
  security:
    register-email-code:
      code-ttl: 5m
      email-cooldown: 60s
      email-daily-limit: 10
      ip-minute-limit: 20
      ip-daily-limit: 200
    login-attempt:
      enabled: true
      max-failures: 5
      window: 15m
      lock-duration: 15m
  document-ingestion:
    storage-dir: storage/document-ingestion
    keep-upload-file: false
    max-retry-count: 3
    cleanup:
      enabled: true
      retention: 24h
      cron: "0 0 * * * *"
    listener:
      concurrency: 2
      max-concurrency: 4